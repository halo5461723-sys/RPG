<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Island V14</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .screen { display: none; width: 100%; max-width: 500px; background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
        .active { display: block; }
        input, select { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #38bdf8; color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        .hp-bar { background: #450a0a; height: 15px; border-radius: 10px; margin: 10px 0; border: 1px solid #000; overflow: hidden; }
        .hp-fill { background: #ef4444; height: 100%; width: 100%; transition: 0.3s; }
        .item-row { display: flex; justify-content: space-between; background: #0f172a; padding: 8px; margin: 5px 0; border-radius: 5px; font-size: 13px; border: 1px solid #334155; }
        .log { background: #000; height: 100px; overflow-y: auto; padding: 10px; font-size: 12px; border-radius: 5px; margin-top: 10px; text-align: left; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen active">
    <h2>⚔️ ĐĂNG NHẬP / ĐĂNG KÝ</h2>
    <input type="text" id="user" placeholder="Tên tài khoản">
    <input type="password" id="pass" placeholder="Mật khẩu">
    <button onclick="auth()">VÀO GAME</button>
</div>

<div id="faction-screen" class="screen">
    <h2>CHỌN TỘC</h2>
    <div id="f-list"></div>
</div>

<div id="game-screen" class="screen">
    <div style="background:#020617; padding:10px; border-radius:5px; text-align: left;">
        <b>👤 <span id="p-name"></span></b> | 💰 <span id="p-gold">0</span><br>
        ⚔️ Dame: <span id="p-dame">20</span> | ❤️ HP: <span id="p-hp">50</span>/<span id="p-mhp">50</span>
    </div>

    <div style="margin-top:10px;">
        <button onclick="tab('battle')">ĐÁNH</button>
        <button onclick="tab('shop')">SHOP</button>
        <button onclick="tab('bag')">BALO</button>
    </div>

    <div id="tab-battle" class="tab-zone active">
        <h3 id="m-name">Quái</h3>
        <div class="hp-bar"><div id="m-hp-bar" class="hp-fill" style="background:#22c55e"></div></div>
        <button onclick="attack()" style="width:100%; background:#ef4444; color:white; padding:15px;">🔥 ĐÁNH (PHẢN 40%)</button>
        <select id="isl-sel" onchange="initM()"><option value="1">Đảo 1</option><option value="2">Đảo 2</option><option value="3">Đảo 3</option></select>
    </div>

    <div id="tab-shop" class="tab-zone" style="display:none; text-align:left;">
        <h4>Cửa hàng</h4>
        <div id="shop-list" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div id="tab-bag" class="tab-zone" style="display:none; text-align:left;">
        <h4>Trang bị trong Balo</h4>
        <div id="bag-list"></div>
        <h4>Phụ kiện Boost</h4>
        <div id="boost-list"></div>
    </div>

    <div class="log" id="log"></div>
    <button onclick="save()" style="background:green; color:white; width:100%; margin-top:10px;">LƯU DỮ LIỆU</button>
</div>

<script>
    const KEY = "SOMALIA_V14_DATA_"; //
    let p = { name:"", pass:"", faction:"", gold:0, hp:50, mhp:50, bd:20, bh:50, bag:[], boosts:[], eqW:null, eqA:null, island:1 };
    let curM = null;

    const facs = { "Cận Chiến":{h:1.1, d:1.2}, "Shark":{h:1.6, d:0.7}, "Devil":{h:0.65, d:1.7}, "Angel":{h:1.8, d:0.7} };
    const shopItems = [
        {id:'w1', n:'Kiếm Gỗ', p:500, d:50}, {id:'w2', n:'Kiếm Sắt', p:5000, d:500}, {id:'w4', n:'Kiếm Shark', p:50000, d:17777}, {id:'w7', n:'Kiếm A', p:1000000, d:200000},
        {id:'a1', n:'Áo da', p:500, h:50}, {id:'a5', n:'Áo choàng bay', p:50000, h:12111}, {id:'a10', n:'Áo choàng long', p:10000000, h:1000000}
    ];
    const mons = { 
        1: [{n:"Post 1", h:50, g:250}], 
        2: [{n:"Shark Binh", h:5000, g:30000}], 
        3: [{n:"Long Nhân", h:2000000, g:10000000, drop:"Long Cốt"}] 
    };

    function auth() {
        let u = document.getElementById('user').value, ps = document.getElementById('pass').value;
        if(!u || !ps) return;
        let s = localStorage.getItem(KEY + u);
        if(s) {
            let d = JSON.parse(s);
            if(d.pass === ps) { p = d; start(); } else alert("Sai MK!");
        } else {
            p.name = u; p.pass = ps;
            document.getElementById('auth-screen').style.display='none';
            document.getElementById('faction-screen').style.display='block';
            let fl = document.getElementById('f-list'); fl.innerHTML = "";
            for(let f in facs) {
                let b = document.createElement('button'); b.innerText = f;
                b.onclick = () => { p.faction = f; p.hp = p.mhp = Math.floor(50 * facs[f].h); start(); };
                fl.appendChild(b);
            }
        }
    }

    function start() {
        document.querySelectorAll('.screen').forEach(s => s.style.display='none');
        document.getElementById('game-screen').style.display='block';
        initM(); update();
    }

    function initM() {
        p.island = document.getElementById('isl-sel').value;
        curM = {...mons[p.island][0]}; update();
    }

    function attack() {
        let d = Math.floor(p.bd * facs[p.faction].d);
        if(p.eqW) d += p.eqW.d;
        if(p.boosts.includes("Long Cốt")) d *= 1.3;
        curM.h -= d; p.hp -= Math.floor(d * 0.4);
        if(curM.h <= 0) {
            p.gold += curM.g;
            if(curM.drop && Math.random() < 0.2) p.boosts.push(curM.drop);
            addLog("Thắng! +"+curM.g); initM();
        }
        if(p.hp <= 0) { p.hp = p.mhp; addLog("Hồi sinh!"); }
        update();
    }

    function tab(id) {
        document.querySelectorAll('.tab-zone').forEach(z => z.style.display='none');
        document.getElementById('tab-'+id).style.display='block';
        if(id === 'shop') renderShop();
        if(id === 'bag') renderBag();
    }

    function renderShop() {
        let s = document.getElementById('shop-list'); s.innerHTML = "";
        shopItems.forEach(i => {
            let row = document.createElement('div'); row.className = "item-row";
            row.innerHTML = `<span>${i.n} (${i.p}$)</span>`;
            let b = document.createElement('button'); b.innerText = "Mua";
            b.onclick = () => { if(p.gold >= i.p) { p.gold -= i.p; p.bag.push(i); update(); renderShop(); } };
            row.appendChild(b); s.appendChild(row);
        });
    }

    function renderBag() {
        let bl = document.getElementById('bag-list'); bl.innerHTML = "";
        p.bag.forEach((i, idx) => {
            let row = document.createElement('div'); row.className = "item-row";
            let isE = (p.eqW?.n === i.n || p.eqA?.n === i.n);
            row.innerHTML = `<span>${i.n} ${isE ? '[ĐEO]' : ''}</span>`;
            let b = document.createElement('button'); b.innerText = isE ? "Tháo" : "Mặc";
            b.onclick = () => {
                if(i.d) p.eqW = isE ? null : i;
                else p.eqA = isE ? null : i;
                update(); renderBag();
            };
            row.appendChild(b); bl.appendChild(row);
        });
        document.getElementById('boost-list').innerText = p.boosts.join(", ") || "Trống";
    }

    function update() {
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-gold').innerText = p.gold.toLocaleString();
        let td = Math.floor(p.bd * facs[p.faction].d) + (p.eqW ? p.eqW.d : 0);
        document.getElementById('p-dame').innerText = Math.floor(p.boosts.includes("Long Cốt") ? td*1.3 : td);
        let th = Math.floor(p.bh * facs[p.faction].h) + (p.eqA ? p.eqA.h : 0);
        p.mhp = Math.floor(p.boosts.includes("Long Cốt") ? th*0.9 : th);
        document.getElementById('p-hp').innerText = p.hp;
        document.getElementById('p-mhp').innerText = p.mhp;
        document.getElementById('p-hp-bar').style.width = (p.hp/p.mhp*100) + "%";
        if(curM) {
            document.getElementById('m-name').innerText = curM.n;
            document.getElementById('m-hp-bar').style.width = (curM.h / mons[p.island][0].h * 100) + "%";
        }
    }

    function addLog(m) { let l = document.getElementById('log'); l.innerHTML = "> " + m + "<br>" + l.innerHTML; }
    function save() { localStorage.setItem(KEY + p.name, JSON.stringify(p)); addLog("Đã lưu!"); }
</script>
</body>
</html>
